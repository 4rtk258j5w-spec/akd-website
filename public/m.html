<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AKD WEB</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#000;color:#fff;font-family:system-ui,sans-serif}
nav{background:#1a1a1a;border-bottom:2px solid #0EA5E9;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.logo{color:#0EA5E9;font-weight:bold;font-size:22px}.con{max-width:1000px;margin:0 auto;padding:16px}
.sp{width:40px;height:40px;border:4px solid #333;border-top:4px solid #0EA5E9;border-radius:50%;margin:40px auto 16px;animation:s 1s linear infinite}@keyframes s{to{transform:rotate(360deg)}}
.gr{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:32px}
.cd{background:#111;border-radius:14px;overflow:hidden;border:1px solid #222}.cd img,.cd video{width:100%;height:220px;object-fit:cover;display:block}
.cb{padding:14px}.cb h3{font-size:17px;margin-bottom:6px}.cb p{color:#999;font-size:14px;line-height:1.6;margin-bottom:8px}.cb a{color:#0EA5E9;font-size:13px;text-decoration:none}
.st{font-size:20px;font-weight:bold;margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid #0EA5E9;display:inline-block}
.bg{position:absolute;bottom:10px;right:10px;background:rgba(0,0,0,.75);color:#0EA5E9;padding:5px 12px;border-radius:8px;font-size:12px}
.sec{background:#111;border:1px solid #222;border-radius:16px;padding:24px;margin-bottom:28px;line-height:1.8;font-size:15px;color:#ccc}
.sec h2{color:#0EA5E9;margin-bottom:12px;font-size:18px}.sec p{color:#FBBF24;font-weight:bold;font-size:16px;line-height:2}
footer{background:#111;border-top:2px solid #0EA5E9;padding:32px 16px;margin-top:40px}
.ftc{max-width:1000px;margin:0 auto}.socrow{display:flex;flex-wrap:wrap;justify-content:center;gap:16px;margin-bottom:24px}
.socbtn{display:flex;flex-direction:column;align-items:center;gap:6px;text-decoration:none;cursor:pointer;min-width:60px}
.socicon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center}
.socbtn span{font-size:11px;color:#ccc}
.phline{text-align:center;margin:16px 0;font-size:18px;font-weight:bold}.phline a{color:#fff;text-decoration:underline;text-underline-offset:4px}
.ftbot{padding-top:16px;border-top:1px solid #222;text-align:center;color:#666;font-size:13px;margin-top:20px}
.sb{display:inline-block;padding:4px 14px;border-radius:20px;font-size:12px;font-weight:bold;color:#fff}
.lbtn{background:#1a1a1a;border:1px solid #0EA5E9;color:#0EA5E9;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:bold}
.lbtn.active{background:#0EA5E9;color:#000}
</style></head><body>
<nav>
<div style="display:flex;gap:6px" id="langBtns"><button class="lbtn active" onclick="setLang('ar')">عربي</button><button class="lbtn" onclick="setLang('en')">EN</button></div>
<div style="display:flex;align-items:center;gap:10px"><span class="sb" id="ss" style="display:none"></span><img id="sl" style="display:none;width:36px;height:36px;border-radius:8px;object-fit:cover"><span class="logo" id="sn">AKD WEB</span></div>
</nav>
<div class="con">
<div id="ld" style="text-align:center"><div class="sp"></div><p style="color:#888" id="ldTxt">جاري التحميل...</p></div>
<div id="bioArea"></div>
<div id="out"></div>
<div id="descArea"></div>
</div>
<footer><div class="ftc">
<div class="socrow" id="socBtns"></div>
<div class="phline" id="phLine"></div>
<div style="text-align:center;color:#999;font-size:14px;margin:12px 0" id="addrLine"></div>
<div class="ftbot" id="ftCopy"></div>
</div></footer>
<script>
var B="https://firestore.googleapis.com/v1/projects/akd-web/databases/(default)/documents/",lang="ar",S={};
function pv(v){if(!v)return"";if(v.stringValue!=null)return v.stringValue;if(v.integerValue!=null)return+v.integerValue;if(v.arrayValue){return(v.arrayValue.values||[]).map(function(i){if(i.mapValue){var o={},f=i.mapValue.fields;for(var k in f)o[k]=pv(f[k]);return o}return pv(i)})}return""}
function pd(d){var r={id:(d.name||"").split("/").pop()},f=d.fields||{};for(var k in f)r[k]=pv(f[k]);return r}
function fc(n){return fetch(B+n).then(function(r){return r.json()}).then(function(d){return(d.documents||[]).map(pd)}).catch(function(){return[]})}
function hl(txt){return txt.replace(/([\[\](){}«»""٪%#@!؟?*&])/g,"<span style=\"color:\#fff\">$1</span>").replace(/(\([^)]*\))/g,"<span style=\"color:\#fff\">$1</span>").replace(/(\[[^\]]*\])/g,"<span style=\"color:\#fff\">$1</span>")}function t(ar,en){return lang==="en"&&en?en:ar||""}
function setLang(l){
  lang=l;document.documentElement.lang=l;document.documentElement.dir=l==="ar"?"rtl":"ltr";document.body.style.direction=l==="ar"?"rtl":"ltr";
  var btns=document.querySelectorAll(".lbtn");btns[0].className=l==="ar"?"lbtn active":"lbtn";btns[1].className=l==="en"?"lbtn active":"lbtn";
  applySettings();applyContent();
}
function applySettings(){
  if(!S.siteName)return;
  var n=t(S.siteName,S.siteNameEn);document.getElementById("sn").textContent=n;document.title=n;
  if(S.status){var b=document.getElementById("ss");b.textContent=t(S.status,S.statusEn);b.style.display="inline-block";b.style.backgroundColor=S.statusColor||"#16a34a"}
  var bio=t(S.bio,S.bioEn);if(bio)document.getElementById("bioArea").innerHTML='<div class="sec"><h2>'+t("من نحن","About Us")+'</h2><p>'+hl(bio)+'</p></div>';
  var desc=t(S.companyDesc,S.companyDescEn);if(desc)document.getElementById("descArea").innerHTML='<div class="sec"><h2>'+t("نشاطات الشركة","Company Activities")+'</h2><p>'+hl(desc)+'</p></div>';
  var btns="";
  if(S.whatsapp)btns+='<a href="https://wa.me/'+S.whatsapp.replace(/[^0-9]/g,"")+'" target="_blank" class="socbtn"><div class="socicon" style="background:#25D366"><svg width="26" height="26" viewBox="0 0 24 24" fill="#fff"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg></div><span>WhatsApp</span></a>';
  if(S.instagram)btns+='<a href="'+S.instagram+'" target="_blank" class="socbtn"><div class="socicon" style="background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888)"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/></svg></div><span>Instagram</span></a>';
  if(S.facebook)btns+='<a href="'+S.facebook+'" target="_blank" class="socbtn"><div class="socicon" style="background:#1877F2"><svg width="24" height="24" viewBox="0 0 24 24" fill="#fff"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg></div><span>Facebook</span></a>';
  if(S.callNumber)btns+='<a href="tel:'+S.callNumber+'" class="socbtn"><div class="socicon" style="background:#16a34a"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6A19.79 19.79 0 012.12 4.11 2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg></div><span>Call</span></a>';
  if(S.email)btns+='<a href="mailto:'+S.email+'" class="socbtn"><div class="socicon" style="background:#EA4335"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 4l-10 8L2 4"/></svg></div><span>Email</span></a>';if(S.mapLink)btns+='<a href="'+S.mapLink+'" target="_blank" class="socbtn"><div class="socicon" style="background:#ef4444"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg></div><span>Location</span></a>';
  document.getElementById("socBtns").innerHTML=btns;
  if(S.phone)document.getElementById("phLine").innerHTML='<a href="tel:'+S.phone+'">'+S.phone+'</a>';
  var addr=t(S.address,S.addressEn);if(addr)document.getElementById("addrLine").innerHTML=addr;
  document.getElementById("ftCopy").innerHTML=t("جميع الحقوق محفوظة","All Rights Reserved")+" — © 2025 "+t(S.siteName,S.siteNameEn);
}
var DATA={posts:[],videos:[],ads:[]};
function applyContent(){
  var h="",posts=DATA.posts,videos=DATA.videos,ads=DATA.ads;
  ads.forEach(function(a){var m="";if(a.fileType&&a.fileType.indexOf("video")===0)m='<video src="'+a.fileUrl+'" autoplay muted loop playsinline style="width:100%;height:220px;object-fit:cover;display:block"></video>';else if(a.fileUrl)m='<img src="'+a.fileUrl+'" style="width:100%;height:220px;object-fit:cover;display:block">';h+='<div style="position:relative;border-radius:14px;overflow:hidden;margin-bottom:12px">'+m+'<div class="bg">'+t("إعلان","Ad")+" — "+(a.name||"")+'</div></div>'});
  if(posts.length){h+='<h2 class="st">'+t("المنشورات","Posts")+'</h2><div class="gr">';posts.forEach(function(p){h+='<div class="cd">';var f=p.files||[];if(f.length>0&&f[0].url){if(f[0].type&&f[0].type.indexOf("video")===0)h+='<video src="'+f[0].url+'" controls playsinline style="width:100%;height:220px;object-fit:cover;display:block"></video>';else h+='<img src="'+f[0].url+'" style="width:100%;height:220px;object-fit:cover;display:block">';}else if(p.imageUrl)h+='<img src="'+p.imageUrl+'" style="width:100%;height:200px;object-fit:cover;display:block">';h+='<div class="cb"><h3>'+(p.title||"")+'</h3>';if(p.description)h+='<p>'+p.description+'</p>';if(p.link)h+='<a href="'+p.link+'" target="_blank">'+t("فتح الرابط","Open Link")+'</a>';h+='</div></div>'});h+='</div>'}
  if(videos.length){h+='<h2 class="st">'+t("الفيديوهات","Videos")+'</h2><div class="gr">';videos.forEach(function(v){h+='<div class="cd"><video src="'+v.videoUrl+'" controls playsinline style="width:100%;height:220px;object-fit:cover;display:block"></video><div class="cb"><h3>'+(v.title||t("بدون عنوان","Untitled"))+'</h3>';if(v.description)h+='<p>'+v.description+'</p>';h+='</div></div>'});h+='</div>'}
  if(!h)h='<p style="text-align:center;padding:60px 0;color:#666">'+t("لا يوجد محتوى بعد.","No content yet.")+'</p>';
  document.getElementById("out").innerHTML=h;
}
fetch(B+"settings/main").then(function(r){return r.json()}).then(function(d){if(d.fields){for(var k in d.fields)S[k]=pv(d.fields[k]);if(S.logoUrl){var l=document.getElementById("sl");l.src=S.logoUrl;l.style.display="block"}applySettings()}}).catch(function(){});
Promise.all([fc("posts"),fc("videos"),fc("ads")]).then(function(r){DATA.posts=r[0];DATA.videos=r[1];DATA.ads=r[2];document.getElementById("ld").style.display="none";applyContent();}).catch(function(){document.getElementById("ld").innerHTML='<p style="color:#ef4444;text-align:center;padding:40px">Error</p>'});
</script></body></html>
